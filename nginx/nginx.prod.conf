server {
    listen 80;
    server_name _;
    server_tokens off;

    # Корень с собранным фронтендом
    root /usr/share/nginx/html;
    index index.html;

    # Статика Django (админка и прочее)
    location /static/ {
        alias /app/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Медиафайлы (загрузки пользователей)
    location /media/ {
        alias /app/media/;
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }

    # API и админка — на бэкенд
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Healthcheck бэкенда (используется для проверки)
    location /health/ {
        proxy_pass http://backend:8000/health/;
        access_log off;
    }

    # SPA — все остальные маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}